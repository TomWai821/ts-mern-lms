services:
  backend-test:
    build:
      context: ./backend
      target: test
    environment:
      MONGO_URI: "mongodb://mongo:27017/test"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/coverage:/app/coverage

  frontend-test:
    build:
      context: ./frontend
      target: test
    depends_on:
      - mongo
    volumes:
      - ./frontend:/app
      - /app/node_modules

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes: 
      - db-data:/data/db
      - ./backend/MongoDBSchema:/docker-entrypoint-initdb.d

volumes:
  db-data: