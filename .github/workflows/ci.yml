name: CI Pipeline

on:
  push:
    branches: 
      - main
    paths-ignore:
      - 'README.md'

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run lint --prefix backend || echo "Lint warnings are non-blocking"
      - run: npm run typecheck --prefix backend
      - run: npm run lint --prefix frontend || echo "Lint warnings are non-blocking"

  test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    env:
      MONGO_URI: mongodb://localhost:27017/test
    steps:
      - uses: actions/checkout@v3
      - run: docker compose -f compose.test.yaml up --abort-on-container-exit
      - run: docker compose -f compose.test.yaml down
      - name: Debug coverage folder
        run: ls -R backend/coverage || true



  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run build --prefix backend
      - run: npm run build --prefix frontend
      - run: docker compose -f compose.yaml up --build -d
      - run: |
          for i in {1..10}; do
            curl -f http://localhost:5000/health/ && break
            echo "Waiting for backend..."
            sleep 5
          done
