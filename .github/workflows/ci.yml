name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      # Install Dependices
      - run: npm install --prefix backend
      - run: npm install --prefix frontend

      # Static check
      - run: npm run lint --prefix ./backend || true
      - run: npm run typecheck --prefix ./backend

      - run: npm run lint --prefix ./frontend || true

      # Unit test (Backend)
      #- run: npm test --prefix backend

      # Build Frontend Service
      - run: npm run build --prefix ./frontend
        env: 
          CI: false

      # Start the docker
      - run: docker compose up --build -d --wait
      # Waiting for health check
      - run: |
          for i in {1..10}; do
            curl -f http://localhost:5000/health/ && break
            echo "Waiting for backend..."
            sleep 5
          done
      # Import seed data (Collection Schemas)
      - run: docker compose exec -T mongo \
          mongoimport --db mydb --collection mycollection \
          --file /docker-entrypoint-initdb.d/data.json --jsonArray

      # Integration test
      - run: npm run test:e2e --prefix backend


