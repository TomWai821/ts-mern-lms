name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
      
jobs:
  deploy-backend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Railway Redeploy via GraphQL
        run: |
          RESPONSE=$(curl -s -X POST \
            --url "https://backboard.railway.app/graphql/v2" \
            --header "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{\"query\":\"mutation { serviceInstanceRedeploy(serviceId: \\\"${{ secrets.RAILWAY_SERVICE_ID }}\\\", environmentId: \\\"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\\\") }\"}" \
            -o /dev/null -w "%{http_code}")
          
          echo "Railway Response Code: $RESPONSE"
          
          if [ "$RESPONSE" -ne 200 ]; then
            echo "Error: API returned $RESPONSE. Check your Token or Service ID."
            exit 1
          else
            echo "Deployment triggered successfully!"
          fi

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend 
    if: ${{ success() }}
    steps:
      - name: Trigger Vercel Deploy
        run: |
          RESPONSE_BODY=$(curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Vercel Response: $RESPONSE_BODY"
          
          if [[ "$RESPONSE_BODY" == *"job"* ]]; then
            echo "Vercel deployment successfully queued."
          else
            echo "Unexpected response from Vercel"
            exit 1
          fi
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
