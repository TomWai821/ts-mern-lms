name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
      
jobs:
  deploy-backend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Railway Redeploy via GraphQL
        run: |
          QUERY='mutation { environmentTriggersDeploy(input: { projectId: "'"${{ secrets.RAILWAY_PROJECT_ID }}"'", environmentId: "'"${{ secrets.RAILWAY_ENVIRONMENT_ID }}"'", serviceId: "'"${{ secrets.RAILWAY_SERVICE_ID }}"'" }) }'

          PAYLOAD=$(jq -n --arg q "$QUERY" '{"query": $q}')

          RESPONSE_CODE=$(curl -s -X POST \
            --url "https://backboard.railway.app/graphql/v2" \
            --header "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD" \
            -o response.json -w "%{http_code}")

          echo "Railway Response Code: $RESPONSE_CODE"
           if [ "$RESPONSE_CODE" -eq 201 ] || [ "$RESPONSE_CODE" -eq 200 ]; then
            echo "RailWay deployment triggered successfully!"
          else
            echo "Error: RailWay API failed with constants $RESPONSE_CODE"
            exit 1
          fi

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend 
    if: ${{ success() }}
    steps:
      - name: Trigger Vercel Deploy
        run: |
         RESPONSE=$(curl -s -X POST -w "%{http_code}" "${{ secrets.VERCEL_DEPLOY_HOOK }}" -o response.json)
          HTTP_CODE=$RESPONSE
          RESPONSE_BODY=$(cat response.json)

          echo "Vercel HTTP Code: $HTTP_CODE"
          echo "Vercel Response: $RESPONSE_BODY"

          if [ "$HTTP_CODE" -eq 201 ] || [ "$HTTP_CODE" -eq 200 ]; then
            echo "Vercel deployment triggered successfully!"
          else
            echo "Error: Vercel API failed with constants $HTTP_CODE"
            exit 1
          fi
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
