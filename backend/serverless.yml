service: book-management-system

provider:
  name: aws
  region: ap-east-1
  stage: dev
  memorySize: 512
  timeout: 15

  ecr:
    images:
      appimage:
        path: ./backend
        file: Dockerfile

  environment:
    AWS_S3_BUCKET_NAME: ${self:custom.bucketName}
    MONGO_URI: ${env:MONGO_URI}
    PORT: 5000
    READINESS_CHECK_PORT: 5000
    AWS_LAMBDA_ADAPTER_SERVICE_PORT: 5000
    AWS_LAMBDA_ADAPTER_RUST_LOG: info
  
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource: "arn:aws:s3:::${self:custom.bucketName}/*"

custom:
  bucketName: my-book-system-uploads-${self:provider.stage}
  apigwBinary:
    types:
      - 'multipart/form-data'

functions:
  api:
    image:
      name: appimage
    url:
      authorizerType: none
      cors: true
    events:
      - httpApi:
          path: '/{proxy+}'


resources:
  Resources:
    BookUploadsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.bucketName}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
